#==========================================================================
# 用途：基于【已有 rootfs tar.gz】构建 panther-x2 (RK3566) 镜像
# rebuild 工具链已内置仓库，完全独立，不依赖外部 ophub 仓库
#==========================================================================
name: Build Debian for panther-x2 (Reuse Rootfs)

on:
  workflow_dispatch:
    inputs:
      rootfs_url:
        description: "已有 rootfs tar.gz 的下载地址 (必填)"
        required: true
        default: ""
      debian_release:
        description: "镜像版本标识 (用于 Release 命名)"
        required: false
        default: "bookworm"
        type: choice
        options:
          - bookworm
          - trixie
      armbian_kernel:
        description: "内核版本"
        required: false
        default: "rk35xx/6.1.y"
        type: choice
        options:
          - 6.12.y
          - rk35xx/6.1.y
      armbian_fstype:
        description: "rootfs 文件系统类型"
        required: false
        default: "ext4"
        type: choice
        options:
          - ext4
          - btrfs
      builder_name:
        description: "构建者签名"
        required: false
        default: "mybuilder"

env:
  TZ: UTC
  ROOTFS_DIR: /builder/debian-rootfs
  BOARD: panther-x2

jobs:
  build:
    runs-on: ubuntu-24.04
    if: ${{ github.event.repository.owner.id == github.event.sender.id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 1. 初始化环境 ──────────────────────────────────────────────────
      - name: Initialize environment
        id: init
        run: |
          sudo -E apt-get -y update
          sudo -E apt-get -y install \
            parted e2fsprogs dosfstools btrfs-progs \
            u-boot-tools uuid-runtime openssl pigz \
            git curl wget xz-utils lz4 zstd pv jq
          echo "status=success" >> "${GITHUB_OUTPUT}"

      # ── 2. 合并磁盘空间 (LVM 扩容以容纳大镜像) ─────────────────────────
      - name: Create build disk
        if: ${{ steps.init.outputs.status == 'success' }}
        run: |
          mnt_size=$(expr $(df -h /mnt | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 1)
          root_size=$(expr $(df -h / | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 4)
          sudo truncate -s "${mnt_size}G" /mnt/mnt.img
          sudo truncate -s "${root_size}G" /root.img
          sudo losetup /dev/loop6 /mnt/mnt.img
          sudo losetup /dev/loop7 /root.img
          sudo pvcreate /dev/loop6 /dev/loop7
          sudo vgcreate github /dev/loop6 /dev/loop7
          sudo lvcreate -n runner -l 100%FREE github
          sudo mkfs.xfs -f /dev/github/runner
          sudo mkdir -p /builder
          sudo mount /dev/github/runner /builder
          sudo chown -R runner:runner /builder

      # ── 3. 准备已有 Rootfs (替代原构建步骤) ──────────────────────────
      - name: Prepare Existing Rootfs
        id: rootfs
        run: |
          set -euo pipefail
          ROOTFS_URL="${{ inputs.rootfs_url }}"
          [[ -z "${ROOTFS_URL}" ]] && { echo "错误：未提供 rootfs_url"; exit 1; }
          
          sudo mkdir -p "${ROOTFS_DIR}"
          echo "▶ 正在下载 rootfs: ${ROOTFS_URL}"
          wget -q --show-progress -O /tmp/rootfs.tar.gz "${ROOTFS_URL}"
          
          echo "▶ 正在解压..."
          # 自动识别压缩格式并解压
          sudo tar -xf /tmp/rootfs.tar.gz -C "${ROOTFS_DIR}"
          rm -f /tmp/rootfs.tar.gz
          
          # 验证基础目录是否存在
          [[ -d "${ROOTFS_DIR}/etc" ]] || { echo "::error::rootfs 结构非法"; exit 1; }
          echo "▶ 解压完成，占用空间: $(sudo du -sh ${ROOTFS_DIR} | awk '{print $1}')"
          echo "status=success" >> "${GITHUB_OUTPUT}"

      # ── 5. Rebuild (注入内核/引导) ───────────────────────────────────
      - name: Rebuild image
        id: rebuild
        if: ${{ steps.pack.outputs.status == 'success' }}
        env:
          KERNEL: ${{ inputs.armbian_kernel }}
          FSTYPE: ${{ inputs.armbian_fstype }}
          BUILDER: ${{ inputs.builder_name }}
        run: |
          set -euo pipefail
          REBUILD_DIR="${GITHUB_WORKSPACE}/rebuild"
          cd "${REBUILD_DIR}"
          mkdir -p build/output/images
          cp -v "${{ steps.pack.outputs.img_path }}" build/output/images/
          
          # 执行本地 rebuild 工具
          KERNEL_VER="${KERNEL##*/}"
          ARGS="-b ${BOARD} -a true -t ${FSTYPE} -s 256/1024 -r ophub/kernel -u rk35xx -n ${BUILDER} -k ${KERNEL_VER}"
          sudo /rebuild ${ARGS}
          
          OUTPUT_DIR="${REBUILD_DIR}/build/output/images"
          mv -v "${OUTPUT_DIR}"/*.img.gz* "${{ steps.pack.outputs.img_outdir }}/" 2>/dev/null || true
          echo "PACKAGED_OUTPUTPATH=${{ steps.pack.outputs.img_outdir }}" >> "${GITHUB_ENV}"
          echo "PACKAGED_STATUS=success" >> "${GITHUB_ENV}"

      # ── 6. 发布 Release ──────────────────────────────────────────────
      - name: Upload to Release
        uses: ncipollo/release-action@main
        if: ${{ env.PACKAGED_STATUS == 'success' }}
        with:
          tag: "Debian_Reuse_${{ github.run_number }}"
          name: "Debian Reused Rootfs · ${{ inputs.armbian_kernel }}"
          artifacts: "${{ env.PACKAGED_OUTPUTPATH }}/*"
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ## 基于已有 Rootfs 构建
            - **来源 URL**: `${{ inputs.rootfs_url }}`
            - **内核**: `${{ inputs.armbian_kernel }}`
            - **文件系统**: `${{ inputs.armbian_fstype }}`
